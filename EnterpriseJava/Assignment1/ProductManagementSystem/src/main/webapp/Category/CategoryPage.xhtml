<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
        <h:form>
            <h:inputHidden value="#{categoryCDI.id}"/>
            <h:panelGrid columns="2" border="1">
                
                <h:outputLabel for="name" value="Category Name : "/>
                <h:inputText id="name" value="#{categoryCDI.name}"/>
                
                <h:commandButton value="#{categoryCDI.id==null ? 'ADD' : 'UPDATE'}" action="#{categoryCDI.createCategory()}"/>
            </h:panelGrid>
        </h:form>
        
        <h:form>
        <h:dataTable value="#{categoryCDI.categories}" var="c" border="2">
            <h:column>
                <f:facet name="header">Name</f:facet>
                #{c.name}
            </h:column>
            <h:column>
                <f:facet name="header">Update</f:facet>
                <h:commandButton value="Update" action="#{categoryCDI.fillCategory()}">
                    <f:setPropertyActionListener target="#{categoryCDI.id}" value="#{c.id}"/>
                </h:commandButton>  
            </h:column>
            <h:column>
                <f:facet name="header">Delete</f:facet>
                <h:commandButton value="Delete" action="#{categoryCDI.deleteCategory(c.id)}"/>
            </h:column>
            </h:dataTable>
        </h:form>
    </h:body>
</html>
