<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
        <h:form>
            <h:panelGrid columns="2" border="1">
                <h:outputLabel for="catgoryName" value="Category"/>
                <h:selectOneMenu id="categoryName" value="#{productCDI.categoryId}">
                    <f:selectItems value="#{productCDI.categories}" var="c" itemLabel="#{c.name}" itemValue="#{c.id}"/>
                </h:selectOneMenu>
            </h:panelGrid>
        </h:form>
        <h:dataTable value="#{productCDI.products}" var="p" border="2">
            <h:column>
                <f:facet name="header">Products</f:facet>
                #{p.productName}
            </h:column>
        </h:dataTable>
    </h:body>
</html>
